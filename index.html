<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tri-Domain Meta-Agent Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(225 16% 24%)",
                        input: "hsl(225 18% 18%)",
                        ring: "hsl(191 91% 60%)",
                        background: "hsl(222 37% 8%)",
                        foreground: "hsl(210 20% 96%)",
                        muted: "hsl(220 16% 58%)",
                        primary: {
                            DEFAULT: "hsl(191 91% 60%)",
                            foreground: "hsl(222 47% 11%)"
                        },
                        card: "hsl(222 40% 12% / 0.62)"
                    },
                    keyframes: {
                        pulseLine: {
                            "0%, 100%": { opacity: "0.35" },
                            "50%": { opacity: "1" }
                        },
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.92)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    },
                    animation: {
                        pulseLine: "pulseLine 1.4s ease-in-out infinite",
                        blob: "blob 10s infinite"
                    },
                    boxShadow: {
                        glass: "0 10px 40px rgba(0, 0, 0, 0.35)"
                    }
                }
            }
        };
    </script>
    <style>
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: #070b16;
            color: #e8edf7;
        }
        .glass {
            background: rgba(17, 25, 40, 0.62);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
        }
        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.2), transparent 38%),
                radial-gradient(circle at 88% 18%, rgba(99, 102, 241, 0.18), transparent 42%),
                radial-gradient(circle at 50% 85%, rgba(16, 185, 129, 0.15), transparent 40%),
                linear-gradient(160deg, #070b16, #0b1224 48%, #0a1120);
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div id="root"></div>

    <script type="importmap">
        {
            "imports": {
                "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
                "react/jsx-dev-runtime": "https://esm.sh/react@18/jsx-dev-runtime"
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react" data-type="module">
        const { useMemo, useState } = React;

        const navItems = [
            { id: "profile", label: "Profile" },
            { id: "career", label: "Career" },
            { id: "health", label: "Health" },
            { id: "finance", label: "Finance" },
            { id: "query", label: "AI Query" },
            { id: "report", label: "Report" }
        ];

        const formatPct = (v) => `${Math.round((Number(v) || 0) * 100)}%`;

        const cn = (...classes) => classes.filter(Boolean).join(" ");

        function Input({ className = "", ...props }) {
            return (
                <input
                    className={cn(
                        "h-10 w-full rounded-md border border-border bg-input px-3 text-sm text-foreground outline-none transition focus:border-cyan-400",
                        className
                    )}
                    {...props}
                />
            );
        }

        function Select({ className = "", children, ...props }) {
            return (
                <select
                    className={cn(
                        "h-10 w-full rounded-md border border-border bg-input px-3 text-sm text-foreground outline-none transition focus:border-cyan-400",
                        className
                    )}
                    {...props}
                >
                    {children}
                </select>
            );
        }

        function Textarea({ className = "", ...props }) {
            return (
                <textarea
                    className={cn(
                        "min-h-[100px] w-full rounded-md border border-border bg-input px-3 py-2 text-sm text-foreground outline-none transition focus:border-cyan-400",
                        className
                    )}
                    {...props}
                />
            );
        }

        function Label({ children }) {
            return <label className="mb-1 block text-[11px] uppercase tracking-widest text-slate-400">{children}</label>;
        }

        function Card({ title, subtitle, children, className = "" }) {
            return (
                <section className={cn("glass rounded-2xl p-5", className)}>
                    {(title || subtitle) && (
                        <header className="mb-4">
                            {title && <h3 className="text-base font-semibold text-slate-100">{title}</h3>}
                            {subtitle && <p className="mt-1 text-xs text-slate-400">{subtitle}</p>}
                        </header>
                    )}
                    {children}
                </section>
            );
        }

        function Stat({ label, value, tone = "default" }) {
            const toneClass = tone === "good"
                ? "text-emerald-300"
                : tone === "warn"
                    ? "text-amber-300"
                    : tone === "bad"
                        ? "text-rose-300"
                        : "text-slate-100";
            return (
                <div className="rounded-xl border border-border bg-slate-900/45 p-3">
                    <p className="text-[11px] uppercase tracking-widest text-slate-400">{label}</p>
                    <p className={cn("mt-1 text-sm font-semibold", toneClass)}>{value}</p>
                </div>
            );
        }

        function LoadingSkeleton() {
            return (
                <div className="space-y-4">
                    <div className="h-4 w-1/3 animate-pulseLine rounded bg-slate-700/60"></div>
                    <div className="h-20 w-full animate-pulseLine rounded-xl bg-slate-700/40"></div>
                    <div className="grid gap-3 md:grid-cols-3">
                        <div className="h-14 animate-pulseLine rounded-xl bg-slate-700/40"></div>
                        <div className="h-14 animate-pulseLine rounded-xl bg-slate-700/40"></div>
                        <div className="h-14 animate-pulseLine rounded-xl bg-slate-700/40"></div>
                    </div>
                </div>
            );
        }

        function Sidebar({ activeSection, onJump }) {
            return (
                <aside className="glass h-fit rounded-2xl p-4 lg:sticky lg:top-6">
                    <div className="mb-4">
                        <p className="text-xs uppercase tracking-[0.2em] text-cyan-300">Tri-Domain</p>
                        <h2 className="mt-1 text-lg font-semibold">Meta-Agent SaaS</h2>
                    </div>
                    <nav className="space-y-2">
                        {navItems.map((item) => (
                            <button
                                key={item.id}
                                onClick={() => onJump(item.id)}
                                className={cn(
                                    "w-full rounded-lg px-3 py-2 text-left text-sm transition",
                                    activeSection === item.id
                                        ? "bg-cyan-400/20 text-cyan-200"
                                        : "text-slate-300 hover:bg-slate-800/60"
                                )}
                            >
                                {item.label}
                            </button>
                        ))}
                    </nav>
                    <div className="mt-6 rounded-xl border border-cyan-500/30 bg-cyan-500/10 p-3 text-xs text-cyan-100">
                        Presentation mode: enabled
                    </div>
                </aside>
            );
        }

        function Dashboard() {
            const [portalMode, setPortalMode] = useState("auth");
            const [activeSection, setActiveSection] = useState("profile");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [data, setData] = useState(null);
            const [userAuth, setUserAuth] = useState(false);
            const [userError, setUserError] = useState("");
            const [userForm, setUserForm] = useState({ username: "", password: "" });
            const [adminAuth, setAdminAuth] = useState(false);
            const [adminError, setAdminError] = useState("");
            const [adminForm, setAdminForm] = useState({ username: "", password: "" });
            const [selectedAdminAction, setSelectedAdminAction] = useState("Manage Users");

            const [adminUsers, setAdminUsers] = useState([
                { id: 1, name: "Arjun", role: "standard", active: true },
                { id: 2, name: "Meera", role: "premium", active: true },
                { id: 3, name: "Kiran", role: "standard", active: false }
            ]);
            const [newUserName, setNewUserName] = useState("");
            const [newUserRole, setNewUserRole] = useState("standard");

            const [perfLoading, setPerfLoading] = useState(false);
            const [perfStats, setPerfStats] = useState(null);

            const [kbDraft, setKbDraft] = useState("");
            const [kbLogs, setKbLogs] = useState([]);

            const [domainDatasets, setDomainDatasets] = useState([]);
            const [datasetLoading, setDatasetLoading] = useState(false);

            const [form, setForm] = useState({
                name: "Arjun",
                age: 28,
                weight_kg: 75,
                height_cm: 175,
                monthly_income: 50000,
                monthly_expenses: 35000,
                location: "Bangalore",
                experience_level: "mid",
                years_experience: 3,
                timeline_months: 6,
                current_skills: "python, sql",
                target_role: "data scientist",
                gender: "male",
                fitness_goal: "general fitness",
                sleep_hours: 7,
                sleep_quality: 7,
                stress_level: 5,
                mood_score: 7,
                query: "How can I improve my career growth and monthly savings while maintaining good health?"
            });

            const sections = useMemo(() => ({
                profile: React.createRef(),
                career: React.createRef(),
                health: React.createRef(),
                finance: React.createRef(),
                query: React.createRef(),
                report: React.createRef()
            }), []);

            const responses = data && Array.isArray(data.responses) ? data.responses : [];
            const career = responses.find((r) => r.domain === "career");
            const health = responses.find((r) => r.domain === "health");
            const finance = responses.find((r) => r.domain === "finance");
            const hasSuccess = data && data.status === "success";

            const reportSummary = useMemo(() => {
                if (!hasSuccess) {
                    return {
                        headline: "Run analysis to generate final report signals.",
                        score: "--",
                        actionLine: "No recommendation available"
                    };
                }

                const healthScore = health && health.mental_health ? Number(health.mental_health.wellness_score) : null;
                const savingsRate = finance && finance.savings ? Number(finance.savings.rate_pct) : null;
                const skillMatch = career && career.skill_gap ? Number(career.skill_gap.match_percentage) : null;

                const values = [healthScore, savingsRate, skillMatch].filter((v) => Number.isFinite(v));
                const score = values.length ? Math.round(values.reduce((a, b) => a + b, 0) / values.length) : null;
                const actionLine = [
                    career && career.recommendation,
                    health && health.recommendation,
                    finance && finance.recommendation
                ].filter(Boolean)[0] || "Balanced growth plan generated";

                return {
                    headline: "Composite readiness across career, health and finance",
                    score: score === null ? "--" : `${score}/100`,
                    actionLine
                };
            }, [hasSuccess, career, health, finance]);

            const update = (key, value) => setForm((prev) => ({ ...prev, [key]: value }));
            const updateAdminForm = (key, value) => setAdminForm((prev) => ({ ...prev, [key]: value }));
            const updateUserForm = (key, value) => setUserForm((prev) => ({ ...prev, [key]: value }));

            const jumpTo = (id) => {
                setActiveSection(id);
                const target = sections[id] && sections[id].current;
                if (target) {
                    target.scrollIntoView({ behavior: "smooth", block: "start" });
                }
            };

            const submitQuery = async () => {
                if (!form.query.trim()) {
                    setError("Please enter a query.");
                    return;
                }

                setError("");
                setLoading(true);
                setData(null);

                const payload = {
                    name: form.name,
                    age: Number(form.age),
                    query: form.query,
                    weight_kg: Number(form.weight_kg),
                    height_cm: Number(form.height_cm),
                    monthly_income: Number(form.monthly_income),
                    monthly_expenses: Number(form.monthly_expenses),
                    current_skills: form.current_skills.split(",").map((s) => s.trim().toLowerCase()).filter(Boolean),
                    target_role: form.target_role,
                    location: form.location,
                    experience_level: form.experience_level,
                    years_experience: Number(form.years_experience),
                    timeline_months: Number(form.timeline_months),
                    current_level: "beginner",
                    current_savings: 0.0,
                    resume_text: "",
                    gender: form.gender,
                    fitness_goal: form.fitness_goal,
                    fitness_experience: form.experience_level,
                    available_days: 3,
                    meals: ["rice", "dal", "vegetables"],
                    nutritional_goal: form.fitness_goal,
                    sleep_hours: Number(form.sleep_hours),
                    sleep_quality: Number(form.sleep_quality),
                    bedtime: "23:00",
                    wakeup_time: "06:00",
                    stress_level: Number(form.stress_level),
                    mood_score: Number(form.mood_score),
                    anxiety_level: 4,
                    last_checkup_months_ago: 12
                };

                try {
                    const res = await fetch("/query", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    const result = await res.json();
                    setData(result);
                } catch (err) {
                    setError("Cannot reach server. Make sure uvicorn is running.");
                } finally {
                    setLoading(false);
                }
            };

            const exportPdfReport = () => {
                if (!hasSuccess) return;
                window.print();
            };

            const downloadJsonReport = () => {
                if (!data) return;
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const anchor = document.createElement("a");
                anchor.href = url;
                anchor.download = `tri-domain-report-${Date.now()}.json`;
                document.body.appendChild(anchor);
                anchor.click();
                anchor.remove();
                URL.revokeObjectURL(url);
            };

            const copySummary = async () => {
                if (!hasSuccess) return;
                const lines = [
                    "Tri-Domain Meta-Agent Summary",
                    `Intent confidence: ${data.intent ? formatPct(data.intent.confidence) : "--"}`,
                    `Domains: ${data.domains_activated ? data.domains_activated.join(", ") : "--"}`,
                    `Readiness score: ${reportSummary.score}`,
                    `Top action: ${reportSummary.actionLine}`
                ];

                try {
                    await navigator.clipboard.writeText(lines.join("\n"));
                } catch (e) {
                    // Clipboard may be unavailable in some browser contexts.
                }
            };

            const loginAdmin = () => {
                const username = adminForm.username.trim().toLowerCase();
                const password = adminForm.password;

                if (username === "admin" && password === "admin123") {
                    setAdminAuth(true);
                    setAdminError("");
                    setAdminForm({ username: "", password: "" });
                    setSelectedAdminAction("Manage Users");
                    setPortalMode("admin");
                    return;
                }

                setAdminAuth(false);
                setAdminError("Invalid admin credentials. Use admin / admin123 for demo.");
            };

            const logoutAdmin = () => {
                setAdminAuth(false);
                setAdminError("");
                setPortalMode("auth");
            };

            const loginUser = () => {
                const username = userForm.username.trim().toLowerCase();
                const password = userForm.password;

                if (username === "user" && password === "user123") {
                    setUserAuth(true);
                    setUserError("");
                    setUserForm({ username: "", password: "" });
                    setPortalMode("user");
                    return;
                }

                setUserAuth(false);
                setUserError("Invalid user credentials. Use user / user123 for demo.");
            };

            const logoutUser = () => {
                setUserAuth(false);
                setUserError("");
                setPortalMode("auth");
            };

            const addUser = () => {
                const trimmed = newUserName.trim();
                if (!trimmed) return;

                const next = {
                    id: Date.now(),
                    name: trimmed,
                    role: newUserRole,
                    active: true
                };
                setAdminUsers((prev) => [...prev, next]);
                setNewUserName("");
                setNewUserRole("standard");
            };

            const toggleUserStatus = (id) => {
                setAdminUsers((prev) => prev.map((u) => (u.id === id ? { ...u, active: !u.active } : u)));
            };

            const removeUser = (id) => {
                setAdminUsers((prev) => prev.filter((u) => u.id !== id));
            };

            const runPerformanceCheck = async () => {
                setPerfLoading(true);
                const started = performance.now();

                try {
                    const [apiStatusRes, healthRes] = await Promise.all([
                        fetch("/api-status"),
                        fetch("/health-check")
                    ]);

                    const apiStatusJson = await apiStatusRes.json();
                    const healthJson = await healthRes.json();

                    const elapsedMs = Math.round(performance.now() - started);
                    setPerfStats({
                        checkedAt: new Date().toLocaleTimeString(),
                        latencyMs: elapsedMs,
                        apiStatus: apiStatusJson.status || "unknown",
                        healthStatus: healthJson.status || "unknown"
                    });
                } catch (e) {
                    setPerfStats({
                        checkedAt: new Date().toLocaleTimeString(),
                        latencyMs: -1,
                        apiStatus: "down",
                        healthStatus: "down"
                    });
                } finally {
                    setPerfLoading(false);
                }
            };

            const saveKnowledgeDraft = () => {
                const text = kbDraft.trim();
                if (!text) return;
                setKbLogs((prev) => [
                    {
                        id: Date.now(),
                        content: text,
                        timestamp: new Date().toLocaleString()
                    },
                    ...prev
                ]);
                setKbDraft("");
            };

            const loadDomainDatasets = async () => {
                setDatasetLoading(true);
                try {
                    const res = await fetch("/domains");
                    const json = await res.json();
                    const mapped = (json.domains || []).map((d) => ({ ...d, enabled: true }));
                    setDomainDatasets(mapped);
                } catch (e) {
                    setDomainDatasets([]);
                } finally {
                    setDatasetLoading(false);
                }
            };

            const toggleDomainDataset = (name) => {
                setDomainDatasets((prev) =>
                    prev.map((d) => (d.name === name ? { ...d, enabled: !d.enabled } : d))
                );
            };

            const switchToUserPortal = () => {
                if (!userAuth) {
                    setUserError("Please login as user first.");
                    setPortalMode("auth");
                    return;
                }
                setPortalMode("user");
            };

            const switchToAdminPortal = () => {
                if (!adminAuth) {
                    setAdminError("Please login as admin first.");
                    setPortalMode("auth");
                    return;
                }
                setPortalMode("admin");
            };

            return (
                <div className="mx-auto min-h-screen w-full max-w-[1500px] p-4 md:p-6">
                    {portalMode !== "auth" && (
                        <div className="mb-4 flex flex-wrap items-center justify-end gap-2">
                            <button
                                onClick={switchToUserPortal}
                                className={cn(
                                    "rounded-full border px-4 py-2 text-xs font-semibold uppercase tracking-widest transition",
                                    portalMode === "user"
                                        ? "border-cyan-300 bg-cyan-400/20 text-cyan-100"
                                        : "border-border bg-slate-900/40 text-slate-300 hover:border-cyan-500/40"
                                )}
                            >
                                User Portal
                            </button>
                            <button
                                onClick={switchToAdminPortal}
                                className={cn(
                                    "rounded-full border px-4 py-2 text-xs font-semibold uppercase tracking-widest transition",
                                    portalMode === "admin"
                                        ? "border-emerald-300 bg-emerald-400/20 text-emerald-100"
                                        : "border-border bg-slate-900/40 text-slate-300 hover:border-emerald-500/40"
                                )}
                            >
                                Admin Portal
                            </button>
                            {portalMode === "user" && (
                                <button
                                    onClick={logoutUser}
                                    className="rounded-full border border-rose-400/40 bg-rose-400/10 px-4 py-2 text-xs font-semibold uppercase tracking-widest text-rose-200 transition hover:bg-rose-400/20"
                                >
                                    User Logout
                                </button>
                            )}
                            {portalMode === "admin" && (
                                <button
                                    onClick={logoutAdmin}
                                    className="rounded-full border border-rose-400/40 bg-rose-400/10 px-4 py-2 text-xs font-semibold uppercase tracking-widest text-rose-200 transition hover:bg-rose-400/20"
                                >
                                    Admin Logout
                                </button>
                            )}
                        </div>
                    )}

                    {portalMode === "auth" && (
                        <main className="mx-auto w-full max-w-4xl space-y-4">
                            <Card title="Welcome to Tri-Domain Meta-Agent" subtitle="Login first to access User or Admin portal">
                                <div className="grid gap-4 md:grid-cols-2">
                                    <div className="rounded-xl border border-cyan-500/30 bg-cyan-500/10 p-4">
                                        <p className="text-xs uppercase tracking-widest text-cyan-300">User Login</p>
                                        <p className="mt-2 text-sm text-cyan-100">Access advisory dashboard and run multi-domain analysis.</p>
                                        <p className="mt-2 text-xs text-cyan-200/80">Demo credentials: user / user123</p>

                                        <div className="mt-3 grid gap-3">
                                            <div>
                                                <Label>Username</Label>
                                                <Input
                                                    value={userForm.username}
                                                    onChange={(e) => updateUserForm("username", e.target.value)}
                                                    placeholder="Enter user username"
                                                />
                                            </div>
                                            <div>
                                                <Label>Password</Label>
                                                <Input
                                                    type="password"
                                                    value={userForm.password}
                                                    onChange={(e) => updateUserForm("password", e.target.value)}
                                                    placeholder="Enter user password"
                                                />
                                            </div>
                                            <button
                                                onClick={loginUser}
                                                className="rounded-md bg-cyan-400 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-cyan-300"
                                            >
                                                Login as User
                                            </button>
                                            {userError && <p className="text-sm text-rose-300">{userError}</p>}
                                        </div>
                                    </div>

                                    <div className="rounded-xl border border-emerald-500/30 bg-emerald-500/10 p-4">
                                        <p className="text-xs uppercase tracking-widest text-emerald-300">Admin Login</p>
                                        <p className="mt-2 text-sm text-emerald-100">Access admin controls and monitoring tools.</p>
                                        <p className="mt-2 text-xs text-emerald-200/80">Demo credentials: admin / admin123</p>

                                        <div className="mt-3 grid gap-3">
                                            <div>
                                                <Label>Username</Label>
                                                <Input
                                                    value={adminForm.username}
                                                    onChange={(e) => updateAdminForm("username", e.target.value)}
                                                    placeholder="Enter admin username"
                                                />
                                            </div>
                                            <div>
                                                <Label>Password</Label>
                                                <Input
                                                    type="password"
                                                    value={adminForm.password}
                                                    onChange={(e) => updateAdminForm("password", e.target.value)}
                                                    placeholder="Enter admin password"
                                                />
                                            </div>
                                            <button
                                                onClick={loginAdmin}
                                                className="rounded-md bg-emerald-400 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-emerald-300"
                                            >
                                                Login as Admin
                                            </button>
                                            {adminError && <p className="text-sm text-rose-300">{adminError}</p>}
                                        </div>
                                    </div>
                                </div>
                            </Card>
                        </main>
                    )}

                    {portalMode === "admin" && (
                        <main className="space-y-4">
                            <Card title="Admin Console" subtitle="Separate admin login and protected controls">
                                {!adminAuth && (
                                    <div className="grid gap-4 lg:grid-cols-[1fr_1.1fr]">
                                        <div className="rounded-xl border border-cyan-500/30 bg-cyan-500/10 p-4">
                                            <p className="text-xs uppercase tracking-widest text-cyan-300">Admin Login</p>
                                            <p className="mt-2 text-sm text-cyan-100">
                                                This panel is fully separate from the user advisory dashboard.
                                            </p>
                                            <p className="mt-3 text-xs text-cyan-200/80">
                                                Demo credentials: admin / admin123
                                            </p>
                                        </div>
